<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sports Stream</title>
    <script src="https://unpkg.com/@discord/embedded-app-sdk"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        video { width: 100%; height: auto; max-height: 100vh; }
    </style>
</head>
<body>
    <video id="video" controls autoplay playsinline></video>

    <script>
        // REPLACE WITH YOUR ACTUAL CLIENT ID
        const discordSdk = new DiscordSDK.DiscordSDK("859410220140331008");

        async function init() {
            await discordSdk.ready();
            const video = document.getElementById('video');
            const streamUrl = 'https://thesports.today.com/live/detail?from=home_middle&h5_bar=true&id=6149487769976036024&sportType=football&utm_source=app_inner_share';

            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
            }
        }
        init();
    </script>
</body>
</html>
